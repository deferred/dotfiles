exclude: (^home/dot_agents/skills/skill-creator/)|(^home/dot_p10k\.zsh$)|\.tmpl$
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-json
        exclude: ^home/private_dot_config/opencode/modify_.*\.json$
      - id: check-yaml
      - id: check-toml

  - repo: meta
    hooks:
      - id: check-hooks-apply
        name: check hooks apply
      - id: check-useless-excludes
        name: check useless excludes

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks
        name: detect secrets

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        name: shellcheck
        args:
          - -x
        files: ^(home/.*\.(sh|bash|zsh)|home/.*/executable_[^/.]+|home/executable_[^/.]+)$
        exclude: ^home/dot_oh-my-zsh/custom/

  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.12.0-2
    hooks:
      - id: shfmt
        name: format shell
        files: ^(home/.*\.(sh|bash|zsh)|home/.*/executable_[^/.]+|home/executable_[^/.]+)$

  - repo: https://github.com/JohnnyMorganz/StyLua
    rev: v2.4.0
    hooks:
      - id: stylua-github
        name: format lua
        args:
          - --config-path
          - home/private_dot_config/astronvim/dot_stylua.toml
        files: ^home/private_dot_config/astronvim/.*\.lua$

  - repo: https://github.com/rvben/rumdl-pre-commit
    rev: v0.1.43
    hooks:
      - id: rumdl-fmt
        name: format markdown
        args:
          - --config
          - .rumdl.toml
